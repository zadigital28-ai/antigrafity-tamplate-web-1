<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Toko Online">
<title>Toko</title>
<link id="favicon" rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: {
    fontFamily: { sans: ['Space Grotesk','sans-serif'] },
    colors: {
      accent: 'var(--color-accent)',
      surface: 'var(--color-surface)',
      'neu-bg': 'var(--color-bg)',
      'neu-text': 'var(--color-text)',
      secondary: 'var(--color-secondary)',
      border: 'var(--color-border)',
      muted: 'var(--color-muted)',
    },
    boxShadow: {
      neu: '4px 4px 0px var(--color-border)',
      'neu-lg': '6px 6px 0px var(--color-border)',
      'neu-sm': '2px 2px 0px var(--color-border)',
    }
  }}
}
</script>
<style>
  :root {
    --color-accent:#0eeef7; --color-bg:#f0f4ff; --color-text:#0a1645;
    --color-surface:#ffffff; --color-secondary:#126bdd;
    --color-border:#0a1645; --color-muted:#64748b;
  }
  body { background:var(--color-bg); color:var(--color-text); font-family:'Space Grotesk',sans-serif; }
  @keyframes spin { to { transform:rotate(360deg) } }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes marquee { 0%{transform:translateX(0)} 100%{transform:translateX(calc(-50% - 12px))} }
  .marquee-track { animation: marquee 60s linear infinite; }
  .marquee-track:hover { animation-play-state:paused; }
  .fade-up { animation: fadeUp .4s ease both; }
</style>
</head>
<body class="bg-neu-bg text-neu-text min-h-screen">

<!-- Shared logic (portable - semua ada di dalam folder ini) -->
<script src="./config.js"></script>
<script src="./core-logic.js"></script>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { fmt, esc, san, useCart, applyTheme, fetchAll, Ctx, Loading, ErrorScreen } = window.APP;

/* ── NAVBAR ── */
function Navbar({ branding, cartCount, onCartOpen }) {
  const [open, setOpen] = useState(false);
  return (
    <nav className="fixed top-0 left-0 w-full z-50 bg-surface border-b-2 border-border shadow-neu">
      <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
        <a href="#" className="flex items-center gap-2 font-black text-lg uppercase tracking-tight">
          {branding.logo_url && <img src={branding.logo_url} className="h-8 w-auto" alt="logo"/>}
          {branding.brand_name || 'TOKO'}
        </a>
        <div className="flex items-center gap-2">
          <button onClick={onCartOpen} className="relative p-2 border-2 border-border rounded-lg shadow-neu-sm bg-surface">
            🛒
            {cartCount > 0 && <span className="absolute -top-1 -right-1 bg-accent text-neu-text text-xs font-black w-5 h-5 rounded-full flex items-center justify-center border border-border">{cartCount}</span>}
          </button>
          <button onClick={() => setOpen(!open)} className="p-2 border-2 border-border rounded-lg shadow-neu-sm bg-surface font-black md:hidden">☰</button>
        </div>
      </div>
      {open && (
        <div className="bg-surface border-t-2 border-border px-4 py-3 flex flex-col gap-3 md:hidden">
          {[['#produk','Produk'],['#testimoni','Testimoni'],['#faq','FAQ'],['admin/index.html','⚙ Admin']].map(([h,l])=>(
            <a key={h} href={h} onClick={()=>setOpen(false)} className="font-bold text-sm uppercase py-1 border-b border-border/30">{l}</a>
          ))}
        </div>
      )}
    </nav>
  );
}

/* ── HERO ── */
function Hero({ branding }) {
  const title = branding.hero_title || branding.brand_name || 'Selamat Datang';
  const sub = branding.hero_subtitle || 'Produk terbaik untuk Anda';
  return (
    <section className="pt-24 pb-12 px-4 text-center">
      {branding.hero_image && (
        <img src={branding.hero_image} className="w-28 h-28 object-contain mx-auto mb-4 animate-bounce" alt="hero"/>
      )}
      <h1 className="text-4xl md:text-5xl font-black uppercase leading-tight mb-4"
        style={{textShadow:'4px 4px 0 var(--color-accent)'}}
        dangerouslySetInnerHTML={{__html: san(title)}}/>
      <p className="text-base md:text-lg font-bold text-muted max-w-xl mx-auto mb-6"
        dangerouslySetInnerHTML={{__html: san(sub)}}/>
      <a href="#produk" className="inline-block bg-accent text-neu-text font-black uppercase px-6 py-3 border-2 border-border shadow-neu rounded-lg text-sm hover:translate-y-[2px] hover:shadow-neu-sm transition-all">
        🛒 Lihat Produk
      </a>
    </section>
  );
}

/* ── PRODUCT CARD ── */
function ProductCard({ item, onDetail, onBuy, onCart }) {
  const price = parseInt(String(item.harga||'0').replace(/\D/g,''))||0;
  const priceCoret = item.harga_coret ? parseInt(String(item.harga_coret).replace(/\D/g,'')) : null;
  const isHabis = (item.stok||'').toLowerCase()==='habis';
  const badgeColor = {terlaris:'bg-red-500 text-white', promo:'bg-yellow-400 text-black', baru:'bg-green-500 text-white'};
  const bc = item.badge ? badgeColor[(item.badge||'').toLowerCase()] || 'bg-secondary text-white' : '';
  return (
    <div className="fade-up bg-surface border-2 border-border shadow-neu rounded-xl overflow-hidden flex flex-col">
      {item.foto_produk_1 && (
        <div className="relative">
          <img src={item.foto_produk_1} className="w-full aspect-square object-cover" loading="lazy" alt={item.nama_produk}/>
          {item.badge && <span className={`absolute top-2 right-2 text-xs font-black px-2 py-1 rounded-full border border-border ${bc}`}>{item.badge}</span>}
        </div>
      )}
      <div className="p-4 flex flex-col flex-1 gap-2">
        <div className="text-xs font-bold uppercase text-secondary tracking-widest">{item.jenis}</div>
        <h3 className="font-black text-base leading-tight">{esc(item.nama_produk)}</h3>
        {item.deskripsi_singkat && (
          <p className="text-xs text-muted line-clamp-2">{esc(item.deskripsi_singkat)} <button onClick={()=>onDetail(item)} className="text-secondary underline">selengkapnya</button></p>
        )}
        <div className="mt-auto">
          {priceCoret && <span className="text-xs line-through text-muted">{fmt(priceCoret)}</span>}
          <div className="text-xl font-black text-secondary">{fmt(price)} <span className="text-xs font-normal text-muted">{item.satuan}</span></div>
          {item.stok && (
            <div className={`text-xs font-bold flex items-center gap-1 mt-1 ${isHabis?'text-red-500':'text-green-600'}`}>
              <span className={`w-2 h-2 rounded-full ${isHabis?'bg-red-500':'bg-green-500'}`}/>
              {item.stok}
            </div>
          )}
        </div>
        <div className="flex gap-2 mt-2">
          <button disabled={isHabis} onClick={()=>onCart(item)} className="flex-1 border-2 border-border font-black text-xs uppercase py-2 rounded-lg shadow-neu-sm disabled:opacity-40 disabled:cursor-not-allowed hover:bg-accent/10 transition-colors">+ Keranjang</button>
          <button disabled={isHabis} onClick={()=>onBuy(item)} className="flex-1 bg-accent border-2 border-border font-black text-xs uppercase py-2 rounded-lg shadow-neu-sm disabled:opacity-40 disabled:cursor-not-allowed">Beli</button>
        </div>
      </div>
    </div>
  );
}

/* ── PRODUCT GRID ── */
function ProductGrid({ products, onDetail, add, checkout }) {
  const [q, setQ] = useState('');
  const [filter, setFilter] = useState('all');
  const [page, setPage] = useState(1);
  const PER = 12;

  const types = [...new Set(products.map(p=>p.jenis).filter(Boolean))];
  const filtered = products
    .filter(p => filter === 'all' || p.jenis === filter)
    .filter(p => !q || (p.nama_produk||'').toLowerCase().includes(q.toLowerCase()) || (p.jenis||'').toLowerCase().includes(q.toLowerCase()))
    .sort((a,b) => (b.badge||'').toLowerCase()==='terlaris' ? 1 : (a.badge||'').toLowerCase()==='terlaris' ? -1 : 0);

  const pages = Math.ceil(filtered.length / PER);
  const shown = filtered.slice((page-1)*PER, page*PER);

  const handleBuy = (item) => { checkout(); };
  const handleCart = (item) => add(item);

  return (
    <section id="produk" className="px-4 pb-12 max-w-5xl mx-auto">
      <h2 className="text-2xl font-black uppercase mb-6 text-center" style={{textShadow:'3px 3px 0 var(--color-accent)'}}>Katalog Produk</h2>
      <div className="mb-4">
        <input value={q} onChange={e=>{setQ(e.target.value);setPage(1)}} placeholder="Cari produk..." className="w-full border-2 border-border rounded-lg px-4 py-2 bg-surface font-medium focus:outline-none focus:border-secondary shadow-neu-sm"/>
      </div>
      {types.length > 0 && (
        <div className="flex gap-2 flex-wrap mb-6">
          {['all',...types].map(t=>(
            <button key={t} onClick={()=>{setFilter(t);setPage(1)}} className={`px-3 py-1 text-xs font-black uppercase border-2 border-border rounded-full shadow-neu-sm transition-colors ${filter===t?'bg-accent':'bg-surface'}`}>{t==='all'?'Semua':t}</button>
          ))}
        </div>
      )}
      {shown.length === 0 ? (
        <p className="text-center text-muted py-12 font-bold">Produk tidak ditemukan.</p>
      ) : (
        <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
          {shown.map((item,i)=>(
            <ProductCard key={i} item={item} onDetail={onDetail} onBuy={()=>{add(item);checkout();}} onCart={()=>add(item)}/>
          ))}
        </div>
      )}
      {pages > 1 && (
        <div className="flex justify-center gap-2 mt-8">
          <button disabled={page===1} onClick={()=>setPage(p=>p-1)} className="px-3 py-1 border-2 border-border font-black rounded-lg shadow-neu-sm disabled:opacity-40">«</button>
          {Array.from({length:pages},(_,i)=>(
            <button key={i} onClick={()=>setPage(i+1)} className={`px-3 py-1 border-2 border-border font-black rounded-lg shadow-neu-sm ${page===i+1?'bg-accent':''}`}>{i+1}</button>
          ))}
          <button disabled={page===pages} onClick={()=>setPage(p=>p+1)} className="px-3 py-1 border-2 border-border font-black rounded-lg shadow-neu-sm disabled:opacity-40">»</button>
        </div>
      )}
    </section>
  );
}

/* ── CART DRAWER ── */
function CartDrawer({ open, onClose, cart, setQty, remove, clear, total, checkout }) {
  return (
    <>
      {open && <div onClick={onClose} className="fixed inset-0 bg-black/50 z-50 backdrop-blur-sm"/>}
      <div className={`fixed bottom-0 left-0 right-0 z-50 bg-surface border-t-2 border-border rounded-t-2xl transition-transform duration-300 ${open?'translate-y-0':'translate-y-full'}`} style={{maxHeight:'80vh',display:'flex',flexDirection:'column'}}>
        <div className="flex items-center justify-between p-4 border-b-2 border-border">
          <h2 className="font-black text-lg uppercase">Keranjang</h2>
          <button onClick={onClose} className="font-black text-xl">✕</button>
        </div>
        <div className="flex-1 overflow-y-auto p-4 space-y-3">
          {cart.length === 0 ? (
            <p className="text-center text-muted py-8 font-bold">Keranjang kosong.</p>
          ) : cart.map((c,i)=>(
            <div key={i} className="flex items-center gap-3 border-2 border-border rounded-xl p-3 shadow-neu-sm bg-neu-bg">
              <div className="flex-1">
                <div className="font-black text-sm">{esc(c.item.nama_produk)}</div>
                <div className="text-secondary font-bold text-sm">{fmt(parseInt(String(c.item.harga||'0').replace(/\D/g,''))*c.qty)}</div>
                {!c.hideQty && (
                  <div className="flex items-center gap-2 mt-1">
                    <button onClick={()=>setQty(c.id,c.qty-1)} className="w-6 h-6 border-2 border-border rounded font-black text-sm flex items-center justify-center">-</button>
                    <span className="font-black text-sm w-6 text-center">{c.qty}</span>
                    <button onClick={()=>setQty(c.id,c.qty+1)} className="w-6 h-6 border-2 border-border rounded font-black text-sm flex items-center justify-center">+</button>
                  </div>
                )}
              </div>
              <button onClick={()=>remove(c.id)} className="text-red-500 font-black text-lg">🗑</button>
            </div>
          ))}
        </div>
        {cart.length > 0 && (
          <div className="p-4 border-t-2 border-border space-y-2 bg-surface">
            <div className="flex justify-between font-black text-lg"><span>Total</span><span>{fmt(total)}</span></div>
            <button onClick={checkout} className="w-full bg-accent border-2 border-border font-black uppercase py-3 rounded-xl shadow-neu text-sm">Pesan via WhatsApp ✅</button>
            <button onClick={clear} className="w-full border-2 border-border font-normal text-xs py-2 rounded-xl text-muted">Kosongkan Keranjang</button>
          </div>
        )}
      </div>
    </>
  );
}

/* ── PRODUCT MODAL ── */
function ProductModal({ item, onClose, onCart, onBuy }) {
  if (!item) return null;
  const price = parseInt(String(item.harga||'0').replace(/\D/g,''))||0;
  const priceCoret = item.harga_coret ? parseInt(String(item.harga_coret).replace(/\D/g,'')) : null;
  const isHabis = (item.stok||'').toLowerCase()==='habis';
  const imgs = [item.foto_produk_1, item.foto_produk_2, item.foto_produk_3].filter(Boolean);
  return (
    <>
      <div onClick={onClose} className="fixed inset-0 bg-black/70 z-50 backdrop-blur-sm"/>
      <div className="fixed inset-x-4 top-1/2 -translate-y-1/2 z-50 bg-surface border-2 border-border rounded-2xl shadow-neu-lg max-h-[90vh] flex flex-col max-w-lg mx-auto">
        <button onClick={onClose} className="absolute top-3 right-3 bg-surface border-2 border-border w-8 h-8 rounded-full font-black flex items-center justify-center shadow-neu-sm z-10">✕</button>
        <div className="overflow-y-auto flex-1">
          {imgs.length > 0 && (
            <div className="flex overflow-x-auto snap-x gap-2 p-4">
              {imgs.map((src,i)=><img key={i} src={src} className="w-full snap-start shrink-0 rounded-xl border-2 border-border aspect-square object-cover" alt={`foto ${i+1}`}/>)}
            </div>
          )}
          <div className="px-4 pb-4">
            <div className="text-xs font-bold uppercase text-secondary tracking-widest mb-1">{item.jenis}</div>
            <h2 className="font-black text-xl mb-2">{esc(item.nama_produk)}</h2>
            {priceCoret && <span className="text-sm line-through text-muted">{fmt(priceCoret)}</span>}
            <div className="text-2xl font-black text-secondary mb-3">{fmt(price)} <span className="text-sm font-normal text-muted">{item.satuan}</span></div>
            {item.deskripsi && <div className="text-sm text-muted leading-relaxed" dangerouslySetInnerHTML={{__html:san(item.deskripsi)}}/>}
          </div>
        </div>
        <div className="p-4 border-t-2 border-border flex gap-2">
          <button disabled={isHabis} onClick={onCart} className="flex-1 border-2 border-border font-black uppercase text-sm py-3 rounded-xl shadow-neu-sm disabled:opacity-40">+ Keranjang</button>
          <button disabled={isHabis} onClick={onBuy} className="flex-1 bg-accent border-2 border-border font-black uppercase text-sm py-3 rounded-xl shadow-neu disabled:opacity-40">Beli Sekarang</button>
        </div>
      </div>
    </>
  );
}

/* ── TESTIMONIALS ── */
function Testimonials({ list }) {
  if (!list.length) return null;
  const doubled = list.length > 2 ? [...list, ...list] : list;
  return (
    <section id="testimoni" className="py-10 bg-surface border-y-2 border-border overflow-hidden">
      <h2 className="text-2xl font-black uppercase text-center mb-6 px-4" style={{textShadow:'3px 3px 0 var(--color-accent)'}}>Kata Mereka</h2>
      <div className={`flex gap-4 w-max ${list.length > 2 ? 'marquee-track' : 'justify-center flex-wrap px-4'}`}>
        {doubled.map((t,i)=>(
          <div key={i} className="w-72 flex-shrink-0 bg-neu-bg border-2 border-border rounded-2xl p-5 shadow-neu">
            <div className="text-yellow-400 text-lg mb-2">{'★'.repeat(parseInt(t.bintang)||5)}</div>
            <p className="text-sm text-muted italic mb-3">"{esc(t.isi)}"</p>
            <div className="font-black text-sm">{esc(t.nama)}</div>
            {t.platform_order && <div className="text-xs text-secondary font-bold">via {esc(t.platform_order)}</div>}
          </div>
        ))}
      </div>
    </section>
  );
}

/* ── FAQ ── */
function FAQ({ list }) {
  const [open, setOpen] = useState(null);
  if (!list.length) return null;
  return (
    <section id="faq" className="py-10 px-4 max-w-2xl mx-auto">
      <h2 className="text-2xl font-black uppercase text-center mb-6" style={{textShadow:'3px 3px 0 var(--color-accent)'}}>FAQ</h2>
      <div className="space-y-3">
        {list.map((f,i)=>(
          <div key={i} className="border-2 border-border rounded-xl shadow-neu overflow-hidden">
            <button onClick={()=>setOpen(open===i?null:i)} className="w-full flex justify-between items-center p-4 font-black text-sm text-left bg-surface">
              <span>{esc(f.pertanyaan||f.question||'')}</span>
              <span className="text-secondary ml-2 text-lg">{open===i?'−':'+'}</span>
            </button>
            {open===i && (
              <div className="px-4 pb-4 text-sm text-muted leading-relaxed bg-neu-bg border-t-2 border-border pt-3" dangerouslySetInnerHTML={{__html:san(f.jawaban||f.answer||'')}}/>
            )}
          </div>
        ))}
      </div>
    </section>
  );
}

/* ── FOOTER ── */
function Footer({ branding }) {
  const socials = [
    ['ig_url','instagram'],['tiktok_url','tiktok'],['youtube_url','youtube'],
    ['facebook_url','facebook'],['shopee_url','shopee'],['wa_number','whatsapp'],
  ];
  return (
    <footer className="bg-neu-text text-surface py-10 px-4 text-center border-t-2 border-border">
      <div className="font-black text-2xl uppercase mb-4">{branding.brand_name||'TOKO'}</div>
      <div className="flex justify-center gap-3 mb-4">
        {socials.map(([key,name])=>{
          const url = key==='wa_number' ? (branding[key]?`https://wa.me/${branding[key].replace(/\D/g,'')}`:null) : branding[key];
          if (!url) return null;
          return (
            <a key={name} href={url} target="_blank" rel="noopener" className="w-10 h-10 rounded-full border-2 border-surface/30 flex items-center justify-center hover:bg-accent/20 transition-colors">
              <img src={`https://cdn.simpleicons.org/${name}/white`} className="w-5 h-5" alt={name}/>
            </a>
          );
        })}
      </div>
      <p className="text-sm text-surface/60">{branding.footer_text || `© ${new Date().getFullYear()} ${branding.brand_name||''}. All rights reserved.`}</p>
      <a href="admin/index.html" className="text-xs text-surface/30 mt-2 inline-block hover:text-surface/60">⚙ Admin</a>
    </footer>
  );
}

/* ── APP ── */
function App() {
  const [data, setData] = useState({ loading:true, error:null, branding:{}, products:[], testimonials:[], faq:[] });
  const [modal, setModal] = useState(null);
  const [cartOpen, setCartOpen] = useState(false);
  const cart = useCart(data.branding.wa_number, data.branding.wa_greeting);

  useEffect(() => {
    fetchAll()
      .then(res => { applyTheme(res.branding||{}); setData({...res, loading:false, error:null}); })
      .catch(err => setData(p=>({...p, loading:false, error:err.message})));
  }, []);

  if (data.loading) return React.createElement(Loading);
  if (data.error) return React.createElement(ErrorScreen, {msg: data.error});

  const { branding, products, testimonials, faq } = data;

  const openDetail = (item) => setModal(item);
  const closeModal = () => setModal(null);

  return (
    <>
      <Navbar branding={branding} cartCount={cart.count} onCartOpen={()=>setCartOpen(true)}/>
      <div className="pt-16">
        <Hero branding={branding}/>
        <ProductGrid products={products} onDetail={openDetail} add={cart.add} checkout={()=>{setCartOpen(false);cart.checkout();}}/>
        <Testimonials list={testimonials}/>
        <FAQ list={faq}/>
        <Footer branding={branding}/>
      </div>
      <CartDrawer
        open={cartOpen} onClose={()=>setCartOpen(false)}
        cart={cart.cart} setQty={cart.setQty} remove={cart.remove}
        clear={cart.clear} total={cart.total} checkout={()=>{setCartOpen(false);setTimeout(cart.checkout,100);}}
      />
      <ProductModal
        item={modal} onClose={closeModal}
        onCart={()=>{if(modal){cart.add(modal);closeModal();setCartOpen(true);}}}
        onBuy={()=>{if(modal){cart.add(modal);closeModal();cart.checkout();}}}
      />
      <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}
        className="fixed bottom-6 right-4 z-40 w-11 h-11 bg-accent border-2 border-border rounded-full shadow-neu font-black text-lg flex items-center justify-center">
        ↑
      </button>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
